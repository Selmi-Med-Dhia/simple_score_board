<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Orbitron:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #1b130f;
      --bg-bottom: #090706;
      --panel: rgba(23, 17, 14, 0.92);
      --ink: #ffd8b3;
      --muted: #d2a47d;
      --line: #6f3b1f;
      --accent: #ff6e2f;
      --accent-strong: #ff4a00;
      --danger: #d01a00;
      --danger-strong: #a00f00;
      --radius: 12px;
      --shadow: 0 14px 38px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: "Teko", "Arial Narrow", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 420px at 8% 2%, rgba(255, 110, 47, 0.18), transparent 60%),
        radial-gradient(700px 340px at 92% 10%, rgba(208, 26, 0, 0.22), transparent 64%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      letter-spacing: 0.02em;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(920px, 100%);
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px 18px 16px;
      display: grid;
      gap: 18px;
      backdrop-filter: blur(1.5px);
      position: relative;
    }

    .next-match {
      position: absolute;
      top: 16px;
      right: 16px;
      width: min(320px, 36vw);
      display: grid;
      gap: 7px;
      grid-template-columns: 1fr 1fr;
      background: rgba(42, 26, 17, 0.9);
      border: 2px solid #9d4d25;
      border-radius: 10px;
      padding: 8px;
    }

    .next-match-label {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #ffd8b3;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1;
      grid-column: 1 / -1;
    }

    .next-match input {
      width: 100%;
      border: 2px solid #9d4d25;
      border-radius: 8px;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: "Teko", "Arial Narrow", sans-serif;
      color: var(--ink);
      background: #2a1c15;
      padding: 6px 8px;
      outline: none;
      line-height: 1;
      text-align: center;
    }

    .next-match input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 47, 0.18);
      background: #362116;
    }

    .round-wrapper {
      display: flex;
      justify-content: center;
      padding-right: min(340px, 40vw);
    }

    .round-input {
      width: min(600px, 100%);
      border: 2px dashed #9d4d25;
      border-radius: var(--radius);
      background: #2a1e17;
      color: var(--ink);
      text-align: center;
      font-size: clamp(2.1rem, 4vw, 3.5rem);
      font-weight: 700;
      text-transform: uppercase;
      padding: 12px;
      outline: none;
    }

    .round-input:focus {
      border-color: var(--accent);
      background: #322218;
    }

    .chrono-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 4px 0;
      background:
        radial-gradient(220px 90px at 20% 10%, rgba(255, 70, 70, 0.18), transparent 72%),
        radial-gradient(260px 110px at 82% 85%, rgba(187, 22, 22, 0.24), transparent 70%),
        linear-gradient(180deg, rgba(66, 8, 8, 0.48), rgba(18, 2, 2, 0.42));
      border: 2px solid rgba(210, 48, 48, 0.78);
      border-radius: 14px;
      padding: 10px;
      position: relative;
      box-shadow:
        inset 0 0 26px rgba(151, 12, 12, 0.45),
        0 0 18px rgba(145, 12, 12, 0.35);
    }

    .chrono-section::before {
      content: "FINAL";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #9c1111, #620707);
      color: #ffe9e9;
      border: 1px solid #f35a5a;
      border-radius: 999px;
      font-size: 0.96rem;
      font-weight: 700;
      padding: 2px 12px;
      letter-spacing: 0.06em;
      line-height: 1;
      text-shadow: 0 0 9px rgba(255, 93, 93, 0.8);
      animation: finalPulse 1.8s ease-in-out infinite;
    }

    .chrono-team {
      display: grid;
      gap: 6px;
      place-items: center;
    }

    .chrono {
      font-family: "Orbitron", monospace;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.6rem, 8vw, 5.2rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.05em;
      padding: 8px 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, #2a0606, #0c0101);
      border: 2px solid #df4141;
      color: #ff9d9d;
      text-shadow: 0 0 14px rgba(231, 42, 42, 0.75);
      min-width: 160px;
      text-align: center;
      user-select: none;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 0 18px rgba(186, 13, 13, 0.5),
        0 0 14px rgba(180, 12, 12, 0.38);
    }

    .chrono::before,
    .chrono::after {
      content: "";
      position: absolute;
      left: -16%;
      top: 50%;
      width: 132%;
      height: 3px;
      background: rgba(255, 131, 131, 0.86);
      box-shadow: 0 0 10px rgba(255, 75, 75, 0.68);
      pointer-events: none;
    }

    .chrono::before {
      transform: rotate(21deg);
    }

    .chrono::after {
      transform: rotate(-21deg);
    }

    .jurors-note {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: #ffd2d2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.95;
      text-shadow: 0 0 7px rgba(255, 88, 88, 0.7);
      animation: noteFlicker 2.4s steps(2, end) infinite;
    }

    .chrono-button {
      border-color: #9d2b2b;
      background: linear-gradient(180deg, #4a1212, #280808);
      color: #ffd9d9;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .chrono-button:hover {
      border-color: #dd5757;
      background: linear-gradient(180deg, #601717, #340a0a);
    }

    @keyframes finalPulse {
      0%, 100% {
        filter: brightness(0.95);
      }
      50% {
        filter: brightness(1.17);
      }
    }

    @keyframes noteFlicker {
      0%, 19%, 22%, 63%, 100% {
        opacity: 0.95;
      }
      20%, 21%, 64%, 66% {
        opacity: 0.58;
      }
    }

    .chrono-help {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chrono-button {
      width: 100%;
      padding: 8px 6px;
      font-size: 1.1rem;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .team {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #1a120e;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .team input[type="text"],
    .team input[type="number"] {
      width: 100%;
      border: 2px solid #9d4d25;
      border-radius: 10px;
      font-size: 2rem;
      font-weight: 700;
      font-family: "Teko", "Arial Narrow", sans-serif;
      padding: 10px 12px;
      outline: none;
      color: var(--ink);
      background: #2a1c15;
    }

    .team input[type="number"] {
      font-size: 3.8rem;
      text-align: center;
      font-weight: 700;
      height: 94px;
      font-family: "Orbitron", monospace;
    }

    .team input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 110, 47, 0.18);
      background: #362116;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      border: 2px solid #9d4d25;
      background: #2a1c15;
      color: var(--ink);
      border-radius: 12px;
      font-size: 1.35rem;
      font-weight: 700;
      font-family: "Teko", "Arial Narrow", sans-serif;
      text-transform: uppercase;
      padding: 12px 8px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #d96e39;
      background: #3a261c;
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: var(--accent);
      color: #1a0900;
      border-color: transparent;
    }

    .primary:hover {
      background: var(--accent-strong);
      border-color: transparent;
    }

    .danger {
      background: var(--danger);
      color: #fff2e4;
      border-color: transparent;
    }

    .danger:hover {
      background: var(--danger-strong);
      border-color: transparent;
    }

    .tiny {
      padding: 8px 8px;
      font-size: 1.05rem;
      letter-spacing: 0.03em;
      min-width: 72px;
    }

    .party {
      background: #ffe083;
      color: #351a00;
      border-color: #ffb938;
    }

    .party:hover {
      background: #ffd05f;
      border-color: #ffa800;
    }

    .party-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .robot-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
    }

    .apoc-robot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(190px, 24vw);
      aspect-ratio: 1;
      transform: translate3d(-50%, -50%, 0);
      will-change: transform, filter;
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.45));
    }

    .apoc-robot img {
      width: 100%;
      height: 100%;
      overflow: visible;
      object-fit: contain;
      display: block;
    }

    .robot-hidden {
      opacity: 0;
      transform: translate3d(-50%, -50%, 0) scale(0.9);
    }

    .robot-visible {
      opacity: 1;
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .robot-fade {
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .mabrouk-popup {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.25s ease;
      background: rgba(0, 0, 0, 0.28);
    }

    .mabrouk-popup.show {
      opacity: 1;
    }

    .mabrouk-content {
      background: linear-gradient(180deg, #371f14, #1f110a);
      border: 3px solid #ff9a3a;
      border-radius: 14px;
      box-shadow: 0 0 32px rgba(255, 110, 47, 0.38);
      padding: 20px 28px;
      text-align: center;
      max-width: min(88vw, 740px);
    }

    .mabrouk-content h2 {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 5.8rem);
      line-height: 0.95;
      font-weight: 700;
      color: #ffe0a8;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255, 110, 47, 0.55);
    }

    .mabrouk-content p {
      margin: 6px 0 0;
      font-size: clamp(2rem, 6vw, 4.4rem);
      line-height: 1;
      font-weight: 700;
      color: #ffb468;
      text-transform: uppercase;
    }

    .results-screen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 10001;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      overflow-y: auto;
      padding: 20px;
    }

    .results-screen.show {
      display: grid;
    }

    .results-content {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      max-width: 740px;
      width: 100%;
    }

    .results-content h1 {
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 6vw, 4rem);
      text-align: center;
      color: #ffe0a8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-shadow: 0 0 12px rgba(255, 110, 47, 0.4);
    }

    .results-list {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-item {
      background: #1a120e;
      border: 2px solid #9d4d25;
      border-radius: 12px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      text-align: center;
    }

    .result-item .team-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffd8b3;
      text-transform: uppercase;
    }

    .result-item .result-score {
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .result-item .score {
      font-size: 1.8rem;
      font-weight: 700;
      font-family: "Orbitron", monospace;
      color: #ffb468;
      min-width: 48px;
    }

    .result-item .winner {
      font-size: 1rem;
      font-weight: 700;
      color: #ffe083;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .results-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (max-width: 720px) {
      .app {
        padding: 14px;
      }

      .next-match {
        top: 12px;
        right: 12px;
        width: 160px;
        padding: 6px;
      }

      .next-match-label {
        font-size: 0.95rem;
      }

      .next-match input {
        font-size: 1.1rem;
      }

      .teams {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Score display panel">
    <aside class="next-match" aria-label="Next match">
      <p class="next-match-label">Next Match</p>
      <input id="nextMatchA" type="text" value="Team C" aria-label="Next match team one" />
      <input id="nextMatchB" type="text" value="Team D" aria-label="Next match team two" />
    </aside>

    <div class="round-wrapper">
      <input id="roundLabel" class="round-input" type="text" value="ROBOLYMPIX 4.0" aria-label="Round label" />
    </div>

    <section class="chrono-section" aria-label="Chronometer section">
      <div class="chrono-team">
        <div id="chronoLeft" class="chrono" aria-live="polite">00.00</div>
        <p class="jurors-note">Jurors Time</p>
        <button id="toggleChronoLeft" class="primary chrono-button" type="button" title="Start or stop left timer">Start</button>
      </div>
      <div class="chrono-team">
        <div id="chronoRight" class="chrono" aria-live="polite">00.00</div>
        <p class="jurors-note">Jurors Time</p>
        <button id="toggleChronoRight" class="primary chrono-button" type="button" title="Start or stop right timer">Start</button>
      </div>
    </section>

    <section class="teams" aria-label="Teams">
      <article class="team" aria-label="Left team">
        <input id="leftName" type="text" value="Team A" aria-label="Left team name" />
        <input id="leftScore" type="number" value="0" min="0" step="1" aria-label="Left team score" />
      </article>

      <article class="team" aria-label="Right team">
        <input id="rightName" type="text" value="Team B" aria-label="Right team name" />
        <input id="rightScore" type="number" value="0" min="0" step="1" aria-label="Right team score" />
      </article>
    </section>

    <section class="controls" aria-label="Bottom controls">
      <button id="leftMinus" type="button" title="Left score -1">L -</button>
      <button id="leftPlus" type="button" title="Left score +1">L +</button>
      <button id="resetScores" type="button" title="Reset both scores">Reset Scores</button>
      <button id="rightMinus" type="button" title="Right score -1">R -</button>
      <button id="rightPlus" type="button" title="Right score +1">R +</button>
      <button id="resetChrono" class="danger" type="button" title="Reset both timers">Reset Time</button>
      <button id="partyBtn" class="tiny party" type="button" title="Celebrate">Party</button>
      <button id="nextMatchBtn" class="primary tiny" type="button" title="Go to next match">Next</button>
    </section>
  </main>

  <div class="robot-layer" aria-hidden="true">
    <div id="apocRobot" class="apoc-robot">
      <img src="zgaf.png" alt="Apocalyptic robot" />
    </div>
  </div>

  <div id="resultsScreen" class="results-screen" aria-hidden="true">
    <div class="results-content">
      <h1>Tournament Results</h1>
      <div id="resultsList" class="results-list"></div>
      <div class="results-actions">
        <button id="resetTournament" type="button" title="Start over">Start Over</button>
        <button id="closeResults" type="button" title="Close results">Close</button>
      </div>
    </div>
  </div>

  <canvas id="partyCanvas" class="party-canvas" aria-hidden="true"></canvas>
  <div id="mabroukPopup" class="mabrouk-popup" aria-hidden="true">
    <div class="mabrouk-content">
      <h2>SA77A</h2>
      <p id="mabroukTeam">TEAM A</p>
    </div>
  </div>

  <script>
    // Matches list
    const matches = [
      { teamA: "LAHMER", teamB: "ZVENDEN" }
    ];

    let currentMatchIndex = 0;
    let matchResults = [];

    const chronoLeftEl = document.getElementById("chronoLeft");
    const chronoRightEl = document.getElementById("chronoRight");
    const toggleChronoLeftBtn = document.getElementById("toggleChronoLeft");
    const toggleChronoRightBtn = document.getElementById("toggleChronoRight");
    const resetChronoBtn = document.getElementById("resetChrono");
    const nextMatchBtn = document.getElementById("nextMatchBtn");

    const leftNameInput = document.getElementById("leftName");
    const rightNameInput = document.getElementById("rightName");
    const leftScoreInput = document.getElementById("leftScore");
    const rightScoreInput = document.getElementById("rightScore");

    const leftMinusBtn = document.getElementById("leftMinus");
    const leftPlusBtn = document.getElementById("leftPlus");
    const rightMinusBtn = document.getElementById("rightMinus");
    const rightPlusBtn = document.getElementById("rightPlus");
    const resetScoresBtn = document.getElementById("resetScores");
    const partyBtn = document.getElementById("partyBtn");
    const partyCanvas = document.getElementById("partyCanvas");
    const partyCtx = partyCanvas.getContext("2d");
    const apocRobot = document.getElementById("apocRobot");
    const mabroukPopup = document.getElementById("mabroukPopup");
    const mabroukTeam = document.getElementById("mabroukTeam");
    const resultsScreen = document.getElementById("resultsScreen");
    const resultsList = document.getElementById("resultsList");
    const resetTournamentBtn = document.getElementById("resetTournament");
    const closeResultsBtn = document.getElementById("closeResults");

    let leftElapsedMs = 0;
    let rightElapsedMs = 0;
    let leftTimerId = null;
    let rightTimerId = null;
    let leftStartTime = 0;
    let rightStartTime = 0;
    let mabroukTimeoutId = null;
    let robotAnimationFrameId = null;
    let robotHideTimeoutId = null;
    let robotShowTimeoutId = null;
    let robotVisible = false;
    let robotSeed = Math.random() * Math.PI * 2;

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function clampRobotPosition(x, y) {
      const robotWidth = apocRobot.getBoundingClientRect().width || 180;
      const robotHeight = apocRobot.getBoundingClientRect().height || 180;
      return {
        x: Math.min(Math.max(x, robotWidth * 0.5 + 12), window.innerWidth - robotWidth * 0.5 - 12),
        y: Math.min(Math.max(y, robotHeight * 0.5 + 12), window.innerHeight - robotHeight * 0.5 - 12)
      };
    }

    function hideRobot() {
      robotVisible = false;
      apocRobot.classList.remove("robot-visible");
      apocRobot.classList.add("robot-hidden");
    }

    function showRobotAtRandomPlace() {
      const baseWidth = apocRobot.getBoundingClientRect().width || 180;
      const baseHeight = apocRobot.getBoundingClientRect().height || 180;
      const position = clampRobotPosition(
        randomBetween(baseWidth * 0.5 + 12, window.innerWidth - baseWidth * 0.5 - 12),
        randomBetween(baseHeight * 0.5 + 12, window.innerHeight - baseHeight * 0.5 - 12)
      );

      const rotation = randomBetween(-12, 12);
      const tilt = randomBetween(-10, 10);
      const scale = randomBetween(0.92, 1.1);

      robotVisible = true;
      apocRobot.classList.remove("robot-hidden");
      apocRobot.classList.add("robot-visible");
      apocRobot.style.opacity = "1";
      apocRobot.style.transform = `translate3d(${position.x}px, ${position.y}px, 0) translate(-50%, -50%) scale(${scale}) rotate(${rotation + tilt}deg)`;

      if (robotHideTimeoutId !== null) {
        window.clearTimeout(robotHideTimeoutId);
      }

      robotHideTimeoutId = window.setTimeout(() => {
        apocRobot.classList.add("robot-fade");
        apocRobot.style.opacity = "0";
        apocRobot.style.transform = `translate3d(${position.x}px, ${position.y}px, 0) translate(-50%, -50%) scale(${scale * 0.9}) rotate(${rotation - 4}deg)`;

        robotShowTimeoutId = window.setTimeout(() => {
          hideRobot();
          scheduleRobotAppearance();
        }, randomBetween(180, 420));
      }, randomBetween(650, 1200));
    }

    function scheduleRobotAppearance() {
      if (robotShowTimeoutId !== null) {
        window.clearTimeout(robotShowTimeoutId);
      }

      const delay = randomBetween(50, 100);
      robotShowTimeoutId = window.setTimeout(() => {
        showRobotAtRandomPlace();
      }, delay);
    }

    function startRobotMotion() {
      apocRobot.classList.add("robot-hidden");
      apocRobot.style.opacity = "0";
      robotSeed = Math.random() * Math.PI * 2;
      if (robotAnimationFrameId !== null) {
        window.cancelAnimationFrame(robotAnimationFrameId);
      }
      scheduleRobotAppearance();
    }

    function formatChrono(ms) {
      const totalHundredths = Math.floor(ms / 10);
      const seconds = Math.floor(totalHundredths / 100);
      const hundredths = totalHundredths % 100;
      return `${String(seconds).padStart(2, "0")}.${String(hundredths).padStart(2, "0")}`;
    }

    function renderChronos() {
      chronoLeftEl.textContent = formatChrono(leftElapsedMs);
      chronoRightEl.textContent = formatChrono(rightElapsedMs);
    }

      function updateResetButtonText() {
        if (leftElapsedMs === 0 && rightElapsedMs === 0) {
          resetChronoBtn.textContent = "Start Time";
        } else {
          resetChronoBtn.textContent = "Reset Time";
        }
      }

    function startChronoLeft() {
      if (leftTimerId !== null) return;
      leftStartTime = performance.now() - leftElapsedMs;
      leftTimerId = window.setInterval(() => {
        leftElapsedMs = performance.now() - leftStartTime;
        renderChronos();
      }, 10);
      toggleChronoLeftBtn.textContent = "Stop";
      toggleChronoLeftBtn.classList.remove("primary");
      toggleChronoLeftBtn.classList.add("danger");
      updateResetButtonText();
    }

    function stopChronoLeft() {
      if (leftTimerId === null) return;
      window.clearInterval(leftTimerId);
      leftTimerId = null;
      toggleChronoLeftBtn.textContent = "Start";
      toggleChronoLeftBtn.classList.remove("danger");
      toggleChronoLeftBtn.classList.add("primary");
      updateResetButtonText();
    }

    function startChronoRight() {
      if (rightTimerId !== null) return;
      rightStartTime = performance.now() - rightElapsedMs;
      rightTimerId = window.setInterval(() => {
        rightElapsedMs = performance.now() - rightStartTime;
        renderChronos();
      }, 10);
      toggleChronoRightBtn.textContent = "Stop";
      toggleChronoRightBtn.classList.remove("primary");
      toggleChronoRightBtn.classList.add("danger");
      updateResetButtonText();
    }

    function stopChronoRight() {
      if (rightTimerId === null) return;
      window.clearInterval(rightTimerId);
      rightTimerId = null;
      toggleChronoRightBtn.textContent = "Start";
      toggleChronoRightBtn.classList.remove("danger");
      toggleChronoRightBtn.classList.add("primary");
      updateResetButtonText();
    }

    function resetChrono() {
      stopChronoLeft();
      stopChronoRight();
      leftElapsedMs = 0;
      rightElapsedMs = 0;
      renderChronos();
      updateResetButtonText();
    }

    function resetOrStartChrono() {
      if (leftElapsedMs === 0 && rightElapsedMs === 0) {
        startChronoLeft();
        startChronoRight();
      } else {
        resetChrono();
      }
    }

    function clampScore(value) {
      return Number.isFinite(value) ? Math.max(0, Math.floor(value)) : 0;
    }

    function adjustScore(input, delta) {
      const current = clampScore(Number(input.value));
      input.value = clampScore(current + delta);
    }

    function resizePartyCanvas() {
      partyCanvas.width = window.innerWidth;
      partyCanvas.height = window.innerHeight;
    }

    function showPartyFlakes() {
      resizePartyCanvas();

      const colors = ["#ffe083", "#ffb347", "#ff6e2f", "#d01a00", "#f7f7f7"];
      const flakes = [];
      const amount = Math.max(140, Math.floor(window.innerWidth / 7));

      for (let i = 0; i < amount; i += 1) {
        flakes.push({
          x: Math.random() * partyCanvas.width,
          y: Math.random() * -partyCanvas.height,
          size: 9 + Math.random() * 14,
          speedY: 1.2 + Math.random() * 3.1,
          speedX: -1.5 + Math.random() * 3,
          tilt: Math.random() * Math.PI * 2,
          tiltSpeed: 0.05 + Math.random() * 0.12,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape: Math.random() > 0.5 ? "rect" : "dot"
        });
      }

      const start = performance.now();
      const duration = 7800;

      function drawFrame(now) {
        const elapsed = now - start;
        partyCtx.clearRect(0, 0, partyCanvas.width, partyCanvas.height);

        for (const flake of flakes) {
          flake.x += flake.speedX;
          flake.y += flake.speedY;
          flake.tilt += flake.tiltSpeed;

          if (flake.y > partyCanvas.height + 20) {
            flake.y = -20;
            flake.x = Math.random() * partyCanvas.width;
          }

          if (flake.x > partyCanvas.width + 20) flake.x = -20;
          if (flake.x < -20) flake.x = partyCanvas.width + 20;

          partyCtx.fillStyle = flake.color;
          if (flake.shape === "rect") {
            partyCtx.save();
            partyCtx.translate(flake.x, flake.y);
            partyCtx.rotate(Math.sin(flake.tilt));
            partyCtx.fillRect(-flake.size / 2, -flake.size / 2, flake.size, flake.size * 0.6);
            partyCtx.restore();
          } else {
            partyCtx.beginPath();
            partyCtx.arc(flake.x, flake.y, flake.size * 0.38, 0, Math.PI * 2);
            partyCtx.fill();
          }
        }

        if (elapsed < duration) {
          window.requestAnimationFrame(drawFrame);
        } else {
          partyCtx.clearRect(0, 0, partyCanvas.width, partyCanvas.height);
        }
      }

      window.requestAnimationFrame(drawFrame);
    }

    function getWinnerName() {
      const leftScore = clampScore(Number(leftScoreInput.value));
      const rightScore = clampScore(Number(rightScoreInput.value));
      const leftName = leftNameInput.value.trim() || "Team A";
      const rightName = rightNameInput.value.trim() || "Team B";

      if (leftScore > rightScore) return leftName;
      if (rightScore > leftScore) return rightName;
      return `${leftName} & ${rightName}`;
    }

    function showMabroukPopup() {
      mabroukTeam.textContent = getWinnerName();
      mabroukPopup.classList.add("show");

      if (mabroukTimeoutId !== null) {
        window.clearTimeout(mabroukTimeoutId);
      }

      mabroukTimeoutId = window.setTimeout(() => {
        mabroukPopup.classList.remove("show");
        mabroukTimeoutId = null;
      }, 10000);
    }

    function celebrateParty() {
      showPartyFlakes();
      showMabroukPopup();
    }

    function loadMatch(index) {
      if (index < 0 || index >= matches.length) return;
      const match = matches[index];
      leftNameInput.value = match.teamA;
      rightNameInput.value = match.teamB;
      resetChrono();
      resetScoresBtn.click();
      updateNextMatchDisplay();
    }

    function updateNextMatchDisplay() {
      if (currentMatchIndex + 1 < matches.length) {
        const nextMatch = matches[currentMatchIndex + 1];
        document.getElementById("nextMatchA").value = nextMatch.teamA;
        document.getElementById("nextMatchB").value = nextMatch.teamB;
      } else {
        document.getElementById("nextMatchA").value = "RESULTS";
        document.getElementById("nextMatchB").value = "FINAL";
      }
    }

    function saveAndAdvanceMatch() {
      if (currentMatchIndex >= matches.length) return;

      const leftScore = clampScore(Number(leftScoreInput.value));
      const rightScore = clampScore(Number(rightScoreInput.value));
      const leftName = leftNameInput.value.trim() || matches[currentMatchIndex].teamA;
      const rightName = rightNameInput.value.trim() || matches[currentMatchIndex].teamB;

      let winner = "Tie";
      if (leftScore > rightScore) winner = leftName;
      else if (rightScore > leftScore) winner = rightName;

      matchResults.push({
        teamA: leftName,
        teamB: rightName,
        scoreA: leftScore,
        scoreB: rightScore,
        winner: winner
      });

      currentMatchIndex += 1;

      if (currentMatchIndex < matches.length) {
        loadMatch(currentMatchIndex);
      } else {
        showResults();
      }
    }

    function showResults() {
      resultsList.innerHTML = matchResults.map((result, idx) => `
        <div class="result-item">
          <div class="team-name">${result.teamA}</div>
          <div class="result-score">
            <div class="score">${result.scoreA}</div>
            <div class="score">${result.scoreB}</div>
          </div>
          <div style="display: grid; gap: 4px;">
            <div class="team-name">${result.teamB}</div>
            <div class="winner">${result.winner === "Tie" ? "TIE" : "" }</div>
          </div>
        </div>
      `).join("");
      resultsScreen.classList.add("show");
    }

    function resetTournament() {
      currentMatchIndex = 0;
      matchResults = [];
      resultsScreen.classList.remove("show");
      loadMatch(0);
    }

    toggleChronoLeftBtn.addEventListener("click", () => {
      if (leftTimerId === null) {
        startChronoLeft();
      } else {
        stopChronoLeft();
      }
    });

    toggleChronoRightBtn.addEventListener("click", () => {
      if (rightTimerId === null) {
        startChronoRight();
      } else {
        stopChronoRight();
      }
    });

    resetChronoBtn.addEventListener("click", resetOrStartChrono);

    leftMinusBtn.addEventListener("click", () => adjustScore(leftScoreInput, -1));
    leftPlusBtn.addEventListener("click", () => adjustScore(leftScoreInput, 1));
    rightMinusBtn.addEventListener("click", () => adjustScore(rightScoreInput, -1));
    rightPlusBtn.addEventListener("click", () => adjustScore(rightScoreInput, 1));

    resetScoresBtn.addEventListener("click", () => {
      leftScoreInput.value = 0;
      rightScoreInput.value = 0;
    });

    partyBtn.addEventListener("click", celebrateParty);
    nextMatchBtn.addEventListener("click", saveAndAdvanceMatch);
    resetTournamentBtn.addEventListener("click", resetTournament);
    closeResultsBtn.addEventListener("click", () => {
      resultsScreen.classList.remove("show");
    });

    leftScoreInput.addEventListener("change", () => {
      leftScoreInput.value = clampScore(Number(leftScoreInput.value));
    });

    rightScoreInput.addEventListener("change", () => {
      rightScoreInput.value = clampScore(Number(rightScoreInput.value));
    });

    window.addEventListener("resize", resizePartyCanvas);

    resizePartyCanvas();
    renderChronos();
    updateResetButtonText();
    loadMatch(0);
    startRobotMotion();
  </script>
</body>
</html>
